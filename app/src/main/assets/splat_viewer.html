<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>ForgeScan Splat Viewer (GaussianSplats3D)</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #14151a; color: #e8e8ec;
    font-family: -apple-system, "Segoe UI", Arial, sans-serif; overflow: hidden; }
  /* Loading/error status only - no title, description, or file picker: this
     copy is embedded in SplatViewerScreen.kt's WebView, which always
     auto-loads the scan via ?src= (see the bottom of this script), so
     there's never a moment where a user needs to pick a file or read a
     marketing blurb. Hidden entirely once loading succeeds, so a completed
     view isn't left with a dead status bar over the render. */
  #status { position: absolute; top: 0; left: 0; z-index: 10; padding: 10px 14px;
    background: rgba(20,21,26,0.82); border-bottom-right-radius: 10px;
    font-size: 13px; color: #f0a742; }
  #status.hidden { display: none; }
</style>
</head>
<body>
<p id="status">Loading...</p>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "@mkkellogg/gaussian-splats-3d": "https://cdn.jsdelivr.net/npm/@mkkellogg/gaussian-splats-3d@0.4.7/build/gaussian-splats-3d.module.js"
  }
}
</script>
<script type="module">
import * as GaussianSplats3D from "@mkkellogg/gaussian-splats-3d";
import * as THREE from "three";

const statusEl = document.getElementById("status");
let viewer = null;

window.loadSplatFile = async function loadSplatFile(file, alphaThresholdOverride) {
  if (viewer) {
    await viewer.dispose();
    viewer = null;
  }

  statusEl.classList.remove("hidden");
  statusEl.textContent = "Loading " + file.name + " (" + (file.size / 1e6).toFixed(0) + " MB)...";

  const url = URL.createObjectURL(file);
  viewer = new GaussianSplats3D.Viewer({
    cameraUp: [0, 0, 1],
    initialCameraPosition: [-1.5, -1.5, 1.5],
    initialCameraLookAt: [0, 0, 0],
    sphericalHarmonicsDegree: 2,
    sharedMemoryForWorkers: false,
  });

  try {
    await viewer.addSplatScene(url, {
      format: GaussianSplats3D.SceneFormat.Ply,
      // Default (1) barely filters anything (range is 0-255). This scan has
      // a low-opacity floater haze surrounding the actual subject; sitting
      // the camera inside that cloud is what was producing a solid black
      // frame, since many overlapping translucent splats stack up to
      // near-opaque. A much higher threshold strips that haze while leaving
      // the dense, high-opacity subject geometry intact.
      splatAlphaRemovalThreshold: alphaThresholdOverride ?? 40,
      showLoadingUI: true,
      progressCallback: (percent) => {
        statusEl.textContent = "Loading... " + Math.round(percent) + "%";
      },
    });
    viewer.start();

    // Median-based framing: a naive AABB min/max is skewed hard by a single
    // outlier floater splat far from the actual subject, so use the median
    // center and the 90th-percentile distance from it instead (robust to
    // outliers the same way the earlier custom WebGL viewer's auto-framing
    // needed to be).
    const mesh = viewer.getSplatMesh();
    const splatCount = mesh.getSplatCount();
    const centers = new Float32Array(splatCount * 3);
    mesh.fillSplatDataArrays(null, null, null, centers, null, null, false);

    const median = (arr) => {
      const sorted = Array.from(arr).sort((a, b) => a - b);
      return sorted[Math.floor(sorted.length / 2)];
    };
    const xs = new Float32Array(splatCount);
    const ys = new Float32Array(splatCount);
    const zs = new Float32Array(splatCount);
    for (let i = 0; i < splatCount; i++) {
      xs[i] = centers[i * 3];
      ys[i] = centers[i * 3 + 1];
      zs[i] = centers[i * 3 + 2];
    }
    const center = new THREE.Vector3(median(xs), median(ys), median(zs));

    const dists = new Float32Array(splatCount);
    for (let i = 0; i < splatCount; i++) {
      const dx = centers[i * 3] - center.x;
      const dy = centers[i * 3 + 1] - center.y;
      const dz = centers[i * 3 + 2] - center.z;
      dists[i] = Math.sqrt(dx * dx + dy * dy + dz * dz);
    }
    const sortedDists = Array.from(dists).sort((a, b) => a - b);
    // p90 itself isn't safe to use as "the object's radius" - confirmed on a
    // real capture where the distance distribution was tight through p75
    // (1.31 at p50, 1.75 at p75) but exploded from p75 to p90 (5.70, a 3.3x
    // jump) and kept climbing to a max of 50.6 (38x the median). That's a
    // much heavier floater tail than the bird/thermos captures this
    // heuristic was originally tuned against (there, even the raw max stayed
    // under 2.4x p90). p75 stays representative of the actual dense subject
    // across both the well- and badly-contaminated cases seen so far.
    const radius = sortedDists[Math.floor(sortedDists.length * 0.75)];

    // 1.3x ties camera distance directly to this file's own remaining-
    // point statistic, so every time the backend's outlier cull
    // (ply_filter.py) gets more aggressive, the same radius shrinks and
    // the camera creeps closer on every load - confirmed on the desktop
    // copy of this viewer as the real cause of a render that looked like
    // a solid dark mass filling the frame (camera landing too close to,
    // or inside, an already-tightened point cloud). 2.2x decouples the
    // two: enough headroom to stay clear of the object regardless of how
    // tightly the data has been trimmed server-side.
    const dir = new THREE.Vector3(1, -1, 0.6).normalize();
    viewer.camera.position.copy(center).addScaledVector(dir, radius * 2.2);
    viewer.controls.target.copy(center);
    viewer.controls.update();

    statusEl.classList.add("hidden");
  } catch (err) {
    statusEl.textContent = "Error: " + err.message;
    console.error(err);
  } finally {
    URL.revokeObjectURL(url);
  }
};

// SplatViewerScreen.kt (Android) always loads this page with ?src=<url>
// pointing at a WebViewAssetLoader path handler that streams the downloaded
// .ply's raw bytes (not a file:// path - modern WebView blocks arbitrary
// file:// access by default, and a JS-bridge byte transfer would be
// memory-prohibitive for a splat file this size).
const autoSrc = new URLSearchParams(location.search).get("src");
if (autoSrc) {
  statusEl.textContent = "Fetching splat...";
  fetch(autoSrc)
    .then((resp) => {
      if (!resp.ok) throw new Error("Fetch failed: " + resp.status);
      return resp.blob();
    })
    .then((blob) => {
      const name = autoSrc.split("/").pop() || "scan.ply";
      loadSplatFile(new File([blob], name, { type: "application/octet-stream" }));
    })
    .catch((err) => {
      statusEl.textContent = "Error: " + err.message;
      console.error(err);
    });
}
</script>
</body>
</html>
